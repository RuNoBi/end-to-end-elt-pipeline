name: source-postgres

services:
  source-postgres:
    image: postgres:16-alpine
    container_name: de_poc_source_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - source_db_data:/var/lib/postgresql/data
      - ./init-source.sql:/docker-entrypoint-initdb.d/01-init-source.sql:ro
      - ./init-sap-chemicals.sql:/docker-entrypoint-initdb.d/02-init-sap-chemicals.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de_poc_network

volumes:
  source_db_data:
    name: source_db_data

networks:
  de_poc_network:
    name: de_poc_network
    external: true
