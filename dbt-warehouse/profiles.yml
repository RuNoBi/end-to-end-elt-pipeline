# Loaded via DBT_PROFILES_DIR=/usr/app (see docker-compose.yml).
# Credentials come from environment variables — never commit .env.
#
# Targets:
#   dev  — local development; test failures stored in dbt_audit
#   prod — Airflow scheduled runs; store_failures disabled
#   ci   — GitHub Actions parse/compile/lint only

de_poc_warehouse:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_WAREHOUSE_HOST') }}"
      port: "{{ env_var('DBT_WAREHOUSE_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_WAREHOUSE_USER') }}"
      password: "{{ env_var('DBT_WAREHOUSE_PASSWORD') }}"
      dbname: "{{ env_var('DBT_WAREHOUSE_DB') }}"
      schema: "{{ env_var('DBT_WAREHOUSE_SCHEMA', 'analytics') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      keepalives_idle: 0
      connect_timeout: 10
      retries: 1
    prod:
      type: postgres
      host: "{{ env_var('DBT_WAREHOUSE_HOST') }}"
      port: "{{ env_var('DBT_WAREHOUSE_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_WAREHOUSE_USER') }}"
      password: "{{ env_var('DBT_WAREHOUSE_PASSWORD') }}"
      dbname: "{{ env_var('DBT_WAREHOUSE_DB') }}"
      schema: "{{ env_var('DBT_WAREHOUSE_SCHEMA', 'analytics') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      keepalives_idle: 0
      connect_timeout: 10
      retries: 1
    ci:
      type: postgres
      host: "{{ env_var('DBT_WAREHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_WAREHOUSE_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_WAREHOUSE_USER', 'ci') }}"
      password: "{{ env_var('DBT_WAREHOUSE_PASSWORD', 'ci') }}"
      dbname: "{{ env_var('DBT_WAREHOUSE_DB', 'ci') }}"
      schema: "{{ env_var('DBT_WAREHOUSE_SCHEMA', 'ci') }}"
      threads: "{{ env_var('DBT_THREADS', '1') | int }}"
