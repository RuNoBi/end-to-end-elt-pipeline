version: 2

sources:
  - name: src_sap_chemicals
    description: >
      SAP chemical sales mock — same source DB as retail (schema sap on de_poc_source_postgres).
      Bronze schema must match Airbyte destination namespace src_sap_chemicals.
    database: "{{ env_var('DBT_WAREHOUSE_DB') }}"
    schema: src_sap_chemicals
    loader: airbyte
    loaded_at_field: _airbyte_extracted_at
    # Ingest SLA: source:bronze_meta.watermark_src_sap_chemicals (sync job time, not row extract time).

    tables:
      - name: sap_material
        columns:
          - name: material_number
            tests: [not_null, unique]
          - name: updated_at
            tests: [not_null]

      - name: sap_business_partner
        columns:
          - name: partner_number
            tests: [not_null, unique]
          - name: updated_at
            tests: [not_null]

      - name: sap_sales_order
        columns:
          - name: sales_order_number
            tests: [not_null, unique]
          - name: partner_number
            tests:
              - not_null
              - relationships:
                  to: source('src_sap_chemicals', 'sap_business_partner')
                  field: partner_number
          - name: changed_at
            tests: [not_null]

      - name: sap_sales_order_item
        columns:
          - name: sales_order_number
            tests: [not_null]
          - name: item_number
            tests: [not_null]
          - name: material_number
            tests:
              - not_null
              - relationships:
                  to: source('src_sap_chemicals', 'sap_material')
                  field: material_number
          - name: item_changed_at
            tests: [not_null]
