version: 2

sources:
  - name: src_local_postgres
    description: >
      Raw landing zone replicated by Airbyte from the operational Postgres source.
      Schema name matches the Airbyte destination namespace.
    database: "{{ env_var('DBT_WAREHOUSE_DB') }}"
    schema: src_local_postgres
    loader: airbyte
    loaded_at_field: _airbyte_extracted_at
    # Ingest SLA: source:bronze_meta.watermark_src_local_postgres (sync job time, not row extract time).

    tables:
      - name: customers
        description: Customer dimension as landed by Airbyte.
        columns:
          - name: id
            description: Surrogate customer identifier from source.
            tests:
              - not_null
          - name: name
            tests:
              - not_null
          - name: email
            tests:
              - not_null
          - name: created_at
            tests:
              - not_null

      - name: orders
        description: Order fact records as landed by Airbyte.
        columns:
          - name: id
            description: Surrogate order identifier from source.
            tests:
              - not_null
          - name: customer_id
            tests:
              - not_null
              - relationships:
                  to: source('src_local_postgres', 'customers')
                  field: id
          - name: order_date
            tests:
              - not_null
          - name: amount
            tests:
              - not_null
