name: de_poc_warehouse
version: 1.0.0
config-version: 2

profile: de_poc_warehouse

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

on-run-start:
  - "create schema if not exists silver"
  - "create schema if not exists gold"
  - "create schema if not exists dbt_audit"

vars:
  raw_schema: src_local_postgres
  sap_raw_schema: src_sap_chemicals
  # Safety window for late-arriving Airbyte rows on incremental runs
  incremental_lookback_days: 3

# ---------------------------------------------------------------------------
# All transform logic lives under models/pipelines/<pipeline_id>/
#   staging/      → silver.stg_*   (incremental tables)
#   intermediate/ → silver.int_*   (views)
#   marts/        → gold.dim_* / fct_* / mart_*
# Selectors: tag:pipeline_<id>  (see Airflow config/pipelines/*.yaml)
# ---------------------------------------------------------------------------
models:
  de_poc_warehouse:
    +on_schema_change: sync_all_columns
    pipelines:
      sales_local_postgres:
        +meta:
          pipeline_id: sales_local_postgres
          domain: retail_sales
          bronze_schema: src_local_postgres
        staging:
          +schema: silver
          +materialized: incremental
          +incremental_strategy: delete+insert
          +tags: ["silver", "medallion_silver", "pipeline_sales_local_postgres"]
        intermediate:
          +schema: silver
          +materialized: view
          +tags: ["silver", "medallion_silver", "pipeline_sales_local_postgres"]
        marts:
          dimensions:
            +schema: gold
            +materialized: incremental
            +incremental_strategy: delete+insert
            +tags: ["gold", "dimension", "pipeline_sales_local_postgres"]
            +post-hook:
              - "analyze {{ this }}"
          facts:
            +schema: gold
            +materialized: incremental
            +incremental_strategy: delete+insert
            +tags: ["gold", "fact", "pipeline_sales_local_postgres"]
            +post-hook:
              - "analyze {{ this }}"
          marts:
            +schema: gold
            +materialized: table
            +tags: ["gold", "mart", "pipeline_sales_local_postgres"]
            +post-hook:
              - "analyze {{ this }}"

      sap_chemicals:
        +meta:
          pipeline_id: sap_chemicals
          domain: sap_chemicals
          bronze_schema: src_sap_chemicals
        staging:
          +schema: silver
          +materialized: incremental
          +incremental_strategy: delete+insert
          +tags: ["silver", "medallion_silver", "pipeline_sap_chemicals"]
        intermediate:
          +schema: silver
          +materialized: view
          +tags: ["silver", "medallion_silver", "pipeline_sap_chemicals"]
        marts:
          dimensions:
            +schema: gold
            +materialized: incremental
            +incremental_strategy: delete+insert
            +tags: ["gold", "dimension", "pipeline_sap_chemicals"]
            +post-hook:
              - "analyze {{ this }}"
          facts:
            +schema: gold
            +materialized: incremental
            +incremental_strategy: delete+insert
            +tags: ["gold", "fact", "pipeline_sap_chemicals"]
            +post-hook:
              - "analyze {{ this }}"
          marts:
            +schema: gold
            +materialized: table
            +tags: ["gold", "mart", "pipeline_sap_chemicals"]
            +post-hook:
              - "analyze {{ this }}"

seeds:
  de_poc_warehouse:
    +schema: silver

# Store test failures outside silver/gold so business schemas stay clean
tests:
  +store_failures: true
  +schema: dbt_audit

snapshots:
  de_poc_warehouse:
    pipelines:
      sales_local_postgres:
        +target_schema: gold
        +tags: ["pipeline_sales_local_postgres"]
