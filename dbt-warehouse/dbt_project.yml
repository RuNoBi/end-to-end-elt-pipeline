name: de_poc_warehouse
version: 1.0.0
config-version: 2

profile: de_poc_warehouse

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

on-run-start:
  - "{{ create_medallion_schemas() }}"
  - "{{ create_bronze_meta() }}"

vars:
  raw_schema: src_local_postgres
  sap_raw_schema: src_sap_chemicals
  incremental_lookback_days: 3
  # Per-pipeline Postgres schemas (single source of truth — also used in docs/CKAN config)
  schema_silver_sales: silver_sales
  schema_silver_sap: silver_sap
  schema_gold_sales: gold_sales
  schema_gold_sap: gold_sap
  schema_silver_api: silver_api
  schema_gold_api: gold_api
  api_raw_schema: src_api_countries

# ---------------------------------------------------------------------------
# models/pipelines/<pipeline_id>/
#   staging/      → silver_<domain>   stg_* incremental tables
#   intermediate/ → silver_<domain>   int_* views
#   marts/        → gold_<domain>     dim_* / fct_* / mart_*
# Selectors: tag:pipeline_<id>  |  selectors.yml  |  make run-sales
# ---------------------------------------------------------------------------
models:
  de_poc_warehouse:
    pipelines:
      sales_local_postgres:
        +owner: data-engineering
        +meta:
          pipeline_id: sales_local_postgres
          domain: retail_sales
          bronze_schema: src_local_postgres
          silver_schema: silver_sales
          gold_schema: gold_sales
        staging:
          +schema: silver_sales
          +materialized: incremental
          +incremental_strategy: delete+insert
          +on_schema_change: sync_all_columns
          +tags: ["silver", "medallion_silver", "pipeline_sales_local_postgres"]
        intermediate:
          +schema: silver_sales
          +materialized: view
          +tags: ["silver", "medallion_silver", "pipeline_sales_local_postgres"]
        marts:
          dimensions:
            +schema: gold_sales
            +materialized: incremental
            +incremental_strategy: delete+insert
            +on_schema_change: sync_all_columns
            +tags: ["gold", "dimension", "pipeline_sales_local_postgres"]
            +post-hook:
              - "analyze {{ this }}"
          facts:
            +schema: gold_sales
            +materialized: incremental
            +incremental_strategy: delete+insert
            +on_schema_change: append_new_columns
            +tags: ["gold", "fact", "pipeline_sales_local_postgres"]
            +post-hook:
              - "analyze {{ this }}"
          marts:
            +schema: gold_sales
            +materialized: table
            +tags: ["gold", "mart", "pipeline_sales_local_postgres"]
            +post-hook:
              - "analyze {{ this }}"

      sap_chemicals:
        +owner: data-engineering
        +meta:
          pipeline_id: sap_chemicals
          domain: sap_chemicals
          bronze_schema: src_sap_chemicals
          silver_schema: silver_sap
          gold_schema: gold_sap
        staging:
          +schema: silver_sap
          +materialized: incremental
          +incremental_strategy: delete+insert
          +on_schema_change: sync_all_columns
          +tags: ["silver", "medallion_silver", "pipeline_sap_chemicals"]
        intermediate:
          +schema: silver_sap
          +materialized: view
          +tags: ["silver", "medallion_silver", "pipeline_sap_chemicals"]
        marts:
          dimensions:
            +schema: gold_sap
            +materialized: incremental
            +incremental_strategy: delete+insert
            +on_schema_change: sync_all_columns
            +tags: ["gold", "dimension", "pipeline_sap_chemicals"]
            +post-hook:
              - "analyze {{ this }}"
          facts:
            +schema: gold_sap
            +materialized: incremental
            +incremental_strategy: delete+insert
            +on_schema_change: sync_all_columns
            +tags: ["gold", "fact", "pipeline_sap_chemicals"]
            +post-hook:
              - "analyze {{ this }}"
          marts:
            +schema: gold_sap
            +materialized: table
            +tags: ["gold", "mart", "pipeline_sap_chemicals"]
            +post-hook:
              - "analyze {{ this }}"

      api_countries:
        +owner: data-engineering
        +meta:
          pipeline_id: api_countries
          domain: api_reference
          bronze_schema: src_api_countries
          silver_schema: silver_api
          gold_schema: gold_api
        staging:
          +schema: silver_api
          +materialized: table
          +on_schema_change: sync_all_columns
          +tags: ["silver", "medallion_silver", "pipeline_api_countries"]
        marts:
          dimensions:
            +schema: gold_api
            +materialized: table
            +on_schema_change: sync_all_columns
            +tags: ["gold", "dimension", "pipeline_api_countries"]
            +post-hook:
              - "analyze {{ this }}"

# store_failures only in dev/ci — prod runs fail fast without persisting audit tables
tests:
  +store_failures: "{{ target.name != 'prod' }}"
  +schema: dbt_audit

snapshots:
  de_poc_warehouse:
    pipelines:
      sales_local_postgres:
        +target_schema: gold_sales
        +tags: ["pipeline_sales_local_postgres"]
