# Localhost-oriented CI: catch broken dbt/Airflow before merge (no production secrets).
name: Quality gates

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dbt-parse:
    name: dbt parse & compile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: dbt-warehouse
    env:
      DBT_TARGET: ci
      DBT_WAREHOUSE_HOST: localhost
      DBT_WAREHOUSE_PORT: "5432"
      DBT_WAREHOUSE_USER: ci
      DBT_WAREHOUSE_PASSWORD: ci
      DBT_WAREHOUSE_DB: ci
      DBT_WAREHOUSE_SCHEMA: ci
      DBT_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dbt
        run: pip install "dbt-core==1.8.7" "dbt-postgres==1.8.2"

      - name: Wait for Postgres service
        run: |
          for i in {1..30}; do
            pg_isready -h "${DBT_WAREHOUSE_HOST}" -p "${DBT_WAREHOUSE_PORT}" -U "${DBT_WAREHOUSE_USER}" && exit 0
            sleep 2
          done
          echo "Postgres service did not become ready in time"
          exit 1
        env:
          PGPASSWORD: ci

      - name: Install packages
        run: dbt deps --profiles-dir .

      - name: Parse project
        run: dbt parse --profiles-dir .

      - name: Compile models
        run: dbt compile --profiles-dir .

  dbt-sqlfluff:
    name: dbt SQL lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt-warehouse
    env:
      DBT_TARGET: ci
      DBT_WAREHOUSE_HOST: localhost
      DBT_WAREHOUSE_PORT: "5432"
      DBT_WAREHOUSE_USER: ci
      DBT_WAREHOUSE_PASSWORD: ci
      DBT_WAREHOUSE_DB: ci
      DBT_WAREHOUSE_SCHEMA: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt + sqlfluff
        run: |
          pip install "dbt-core==1.8.7" "dbt-postgres==1.8.2" sqlfluff sqlfluff-templater-dbt

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: Lint pipeline SQL
        run: sqlfluff lint models/pipelines macros --dialect postgres

  airflow-dag-check:
    name: Airflow DAG syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate DAG imports (syntax only)
        run: |
          python -m py_compile airflow-platform/dags/elt_main_pipeline.py
          python -m py_compile airflow-platform/dags/common/alerting.py
          python -m py_compile airflow-platform/dags/common/airbyte_validate.py
          python -m py_compile airflow-platform/dags/common/ckan_publish.py
