# CKAN datasets for pipeline sales_local_postgres (loaded by publish task).

publications:
  - package_name: sales-performance-mart
    package_title: Sales Performance Mart
    resource_name: mart_sales_performance
    schema: gold_sales
    table: mart_sales_performance
    description: Monthly sales KPIs by customer, segment, and order status.
    primary_key: customer_id,order_month,order_status,order_value_segment
    frequency: daily
    catalog_domain: retail-sales
    catalog_layer: mart
    catalog_order: 10

  - package_name: customer-dimension
    package_title: Customer Dimension
    resource_name: dim_customer
    schema: gold_sales
    table: dim_customer
    description: Conformed customer dimension — current attributes.
    primary_key: customer_id
    max_rows: "50000"
    frequency: daily
    catalog_domain: retail-sales
    catalog_layer: dimension
    catalog_order: 20

  - package_name: date-dimension
    package_title: Date Dimension
    resource_name: dim_date
    schema: gold_sales
    table: dim_date
    description: Calendar dimension for order dates.
    primary_key: date_key
    frequency: daily
    catalog_domain: retail-sales
    catalog_layer: dimension
    catalog_order: 21

  - package_name: orders-fact
    package_title: Orders Fact
    resource_name: fct_orders
    schema: gold_sales
    table: fct_orders
    description: Order fact (catalog sample; full history in warehouse).
    primary_key: order_id
    max_rows: "100000"
    frequency: daily
    catalog_domain: retail-sales
    catalog_layer: fact
    catalog_order: 30
