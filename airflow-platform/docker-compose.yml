name: airflow-platform

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: airflow-platform/Dockerfile
  image: de-poc-airflow:latest
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Use AIRFLOW_METADATA_* (not generic POSTGRES_*) so shell env from source-postgres cannot break Airflow DB
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_METADATA_USER}:${AIRFLOW_METADATA_PASSWORD}@airflow-postgres/${AIRFLOW_METADATA_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Bangkok
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    # dbt reads these via BashOperator (also available in mounted /opt/dbt/.env)
    DBT_WAREHOUSE_HOST: ${DBT_WAREHOUSE_HOST}
    DBT_WAREHOUSE_PORT: ${DBT_WAREHOUSE_PORT}
    DBT_WAREHOUSE_USER: ${DBT_WAREHOUSE_USER}
    DBT_WAREHOUSE_PASSWORD: ${DBT_WAREHOUSE_PASSWORD}
    DBT_WAREHOUSE_DB: ${DBT_WAREHOUSE_DB}
    DBT_WAREHOUSE_SCHEMA: ${DBT_WAREHOUSE_SCHEMA}
    DBT_TARGET: ${DBT_TARGET:-prod}
    DBT_THREADS: ${DBT_THREADS}
    # Baked in image at build time — safe for concurrent DAGs (see docs/BEST_PRACTICES_LOCAL.md)
    DBT_PACKAGES_INSTALL_PATH: /opt/dbt-vendor/dbt_packages
    AIRFLOW_VAR_AIRBYTE_CONNECTION_ID: ${AIRFLOW_VAR_AIRBYTE_CONNECTION_ID}
    AIRFLOW_VAR_AIRBYTE_CONNECTION_ID_SAP_CHEMICALS: ${AIRFLOW_VAR_AIRBYTE_CONNECTION_ID_SAP_CHEMICALS:-}
    AIRFLOW_VAR_AIRBYTE_API_BASE_URL: ${AIRFLOW_VAR_AIRBYTE_API_BASE_URL:-http://airbyte-proxy:8000/api/v1}
    # Failure email alerts (see docs/AIRFLOW_ALERTING.md)
    AIRFLOW_ALERT_EMAILS: ${AIRFLOW_ALERT_EMAILS:-}
    AIRFLOW_WEBSERVER_BASE_URL: ${AIRFLOW_WEBSERVER_BASE_URL:-http://localhost:8080}
    AIRFLOW__SMTP__SMTP_HOST: ${AIRFLOW_SMTP_HOST:-}
    AIRFLOW__SMTP__SMTP_PORT: ${AIRFLOW_SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_USER: ${AIRFLOW_SMTP_USER:-}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${AIRFLOW_SMTP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${AIRFLOW_SMTP_MAIL_FROM:-}
    AIRFLOW__SMTP__SMTP_STARTTLS: ${AIRFLOW_SMTP_STARTTLS:-True}
    AIRFLOW__SMTP__SMTP_SSL: ${AIRFLOW_SMTP_SSL:-False}
    AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_WEBSERVER_BASE_URL:-http://localhost:8080}
    # CKAN catalog (publication task)
    CKAN_URL: ${CKAN_URL:-http://ckan:5000}
    CKAN_API_TOKEN: ${CKAN_API_TOKEN:-}
    CKAN_ORGANIZATION: ${CKAN_ORGANIZATION:-ube-group-thailand}
    CKAN_PUBLISH_MAX_ROWS: ${CKAN_PUBLISH_MAX_ROWS:-100000}
    CKAN_UPSERT_BATCH_SIZE: ${CKAN_UPSERT_BATCH_SIZE:-2000}
    AIRFLOW_VAR_CKAN_API_TOKEN: ${AIRFLOW_VAR_CKAN_API_TOKEN:-}
    AIRFLOW_VAR_CKAN_ORGANIZATION: ${CKAN_ORGANIZATION:-ube-group-thailand}
    AIRFLOW_VAR_CKAN_PUBLISH_MAX_ROWS: ${CKAN_PUBLISH_MAX_ROWS:-100000}
    AIRFLOW_VAR_CKAN_UPSERT_BATCH_SIZE: ${CKAN_UPSERT_BATCH_SIZE:-2000}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./config:/opt/airflow/pipeline_config
    - airflow_logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../dbt-warehouse:/opt/dbt
  user: "50000:0"
  networks:
    - de_poc_network
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  # Local SMTP for PoC alerts (no external credentials). Web UI: http://localhost:8025
  airflow-mailpit:
    image: axllent/mailpit:v1.21
    container_name: airflow-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      # Optional relay to real inbox — set in .env: AIRFLOW_SMTP_RELAY_HOST + credentials
      MP_SMTP_RELAY_HOST: ${AIRFLOW_SMTP_RELAY_HOST:-}
      MP_SMTP_RELAY_PORT: ${AIRFLOW_SMTP_RELAY_PORT:-587}
      MP_SMTP_RELAY_STARTTLS: ${AIRFLOW_SMTP_RELAY_STARTTLS:-True}
      MP_SMTP_RELAY_AUTH: ${AIRFLOW_SMTP_RELAY_AUTH:-}
      MP_SMTP_RELAY_USERNAME: ${AIRFLOW_SMTP_RELAY_USER:-}
      MP_SMTP_RELAY_PASSWORD: ${AIRFLOW_SMTP_RELAY_PASSWORD:-}
      MP_SMTP_RELAY_ALL: ${AIRFLOW_SMTP_RELAY_ALL:-false}
    networks:
      - de_poc_network

  airflow-postgres:
    image: postgres:16-alpine
    container_name: airflow-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${AIRFLOW_METADATA_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_METADATA_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_METADATA_DB}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_METADATA_USER} -d ${AIRFLOW_METADATA_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de_poc_network

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname "$${AIRFLOW_ADMIN_FIRSTNAME}" \
          --lastname "$${AIRFLOW_ADMIN_LASTNAME}" \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" || true
    environment:
      <<: *airflow-common-env
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-mailpit:
        condition: service_started

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-mailpit:
        condition: service_started

volumes:
  airflow_postgres_data:
    name: airflow_postgres_data
  airflow_logs:
    name: airflow_logs

networks:
  de_poc_network:
    name: de_poc_network
    external: true
